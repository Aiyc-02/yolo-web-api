<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOLO Web 目标检测台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .drop-zone {
            border: 2px dashed #4b5563;
            transition: border-color 0.3s ease;
        }
        .drop-zone.dragover {
            border-color: #3b82f6;
            background-color: #eff6ff;
        }
        /* 简单的加载动画 */
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            display: none;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen font-sans text-gray-800">

    <div class="container mx-auto px-4 py-8 max-w-4xl">
        <!-- 标题区域 -->
        <div class="text-center mb-10">
            <h1 class="text-4xl font-bold text-gray-900 mb-2">云端目标检测平台</h1>
            <p class="text-gray-500">基于 FastAPI 与 YOLOv8 引擎</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            
            <!-- 左侧：控制与上传区 -->
            <div class="bg-white p-6 rounded-xl shadow-lg flex flex-col items-center">
                <h2 class="text-xl font-semibold mb-4 w-full border-b pb-2">操作面板</h2>
                
                <!-- 拖拽上传区域 -->
                <div id="dropZone" class="drop-zone w-full rounded-lg p-10 flex flex-col items-center justify-center cursor-pointer hover:bg-gray-50 mb-6">
                    <svg class="w-12 h-12 text-gray-400 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
                    </svg>
                    <p class="text-gray-600 font-medium">点击或拖拽图片到此处</p>
                    <p class="text-xs text-gray-400 mt-1">支持 JPG, PNG 格式</p>
                    <!-- 隐藏的实际文件输入框 -->
                    <input type="file" id="fileInput" class="hidden" accept="image/*">
                </div>

                <!-- 状态提示 -->
                <div id="statusText" class="text-sm font-medium text-blue-600 mb-4 h-5">等待上传图片...</div>
                
                <!-- 加载动画 -->
                <div id="loading" class="loader mb-4"></div>

                <button id="detectBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition duration-200 disabled:opacity-50 disabled:cursor-not-allowed" disabled>
                    开始检测
                </button>
            </div>

            <!-- 右侧：结果展示区 -->
            <div class="bg-white p-6 rounded-xl shadow-lg flex flex-col items-center justify-center min-h-[400px]">
                <h2 class="text-xl font-semibold mb-4 w-full border-b pb-2 self-start">检测结果</h2>
                
                <div class="flex-grow flex items-center justify-center w-full bg-gray-50 rounded-lg overflow-hidden border border-gray-200 relative">
                    <!-- 原始/结果图片占位符 -->
                    <img id="resultImage" src="" alt="等待检测" class="max-w-full max-h-full object-contain hidden">
                    <span id="placeholderText" class="text-gray-400">请在左侧上传图片进行检测</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const detectBtn = document.getElementById('detectBtn');
        const resultImage = document.getElementById('resultImage');
        const placeholderText = document.getElementById('placeholderText');
        const statusText = document.getElementById('statusText');
        const loading = document.getElementById('loading');

        let currentFile = null;

        // --- 事件监听器设置 ---

        // 点击上传区域触发文件选择
        dropZone.addEventListener('click', () => fileInput.click());

        // 拖拽事件处理
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            if (e.dataTransfer.files.length > 0) {
                handleFileSelect(e.dataTransfer.files[0]);
            }
        });

        // 文件选择事件处理
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFileSelect(e.target.files[0]);
            }
        });

        // 处理文件选中后的逻辑
        function handleFileSelect(file) {
            if (!file.type.startsWith('image/')) {
                alert('请上传图片文件！');
                return;
            }
            currentFile = file;
            statusText.textContent = `已选择: ${file.name}`;
            detectBtn.disabled = false;
            
            // 预览选中的图片 (可选，这里先不展示原图，直接等检测结果)
            placeholderText.textContent = "已准备好，请点击开始检测";
            resultImage.classList.add('hidden');
        }

        // --- 核心：与后端 API 交互 ---
        detectBtn.addEventListener('click', async () => {
            if (!currentFile) return;

            // UI 状态更新：准备发送请求
            detectBtn.disabled = true;
            statusText.textContent = "正在云端进行 AI 推理，请稍候...";
            loading.style.display = 'block';
            placeholderText.classList.add('hidden');
            resultImage.classList.add('hidden');

            // 构建表单数据 (模拟 HTML 表单提交)
            const formData = new FormData();
            formData.append('file', currentFile);

            try {
                // 向本地运行的 FastAPI 服务器发送 POST 请求
                // 注意：这里的 URL 需要与你 FastAPI 运行的地址一致
                const response = await fetch('/detect', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    throw new Error(`服务器响应错误: ${response.status}`);
                }

                // 接收返回的图片二进制数据 (Blob)
                const imageBlob = await response.blob();
                
                // 将二进制数据转换为浏览器可以显示的 URL
                const imageUrl = URL.createObjectURL(imageBlob);
                
                // 更新 UI 展示结果
                resultImage.src = imageUrl;
                resultImage.classList.remove('hidden');
                statusText.textContent = "检测完成！";

            } catch (error) {
                console.error('检测失败:', error);
                statusText.textContent = `检测失败: ${error.message}`;
                statusText.classList.replace('text-blue-600', 'text-red-600');
                placeholderText.textContent = "检测出错，请检查后端是否运行。";
                placeholderText.classList.remove('hidden');
            } finally {
                // 恢复 UI 状态
                loading.style.display = 'none';
                detectBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
